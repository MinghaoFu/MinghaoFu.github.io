  <script>
    // Decide the theme before first paint to avoid a flash for fresh visitors.
    // A saved choice wins; otherwise default by local clock — light 7am–7pm,
    // dark in the evening/night. Mirrors defaultThemeByClock() in js/app.js.
    (function(){
      try{
        var t = localStorage.getItem('mf-theme-v1');
        if (t !== 'light' && t !== 'dark') {
          var h = new Date().getHours();
          t = (h >= 7 && h < 19) ? 'light' : 'dark';
        }
        document.documentElement.setAttribute('data-theme', t);
        var m = document.querySelector('meta[name="theme-color"]');
        if (m) m.content = (t === 'light') ? '#ffffff' : '#121212';
      }catch(e){}
    })();
  </script>
